services:
  status-api:
    image: node:22-alpine
    container_name: directory_status_api
    restart: always
    working_dir: /app
    command: ["node", "status-server.js"]
    volumes:
      - ./:/app:ro

  nginx:
    image: nginx:stable-alpine-slim
    container_name: local_directory
    restart: always
    depends_on:
      - status-api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./htdocs:/var/www:ro
